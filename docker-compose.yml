services:
  db:
    image: postgres:18.1-trixie
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      UI_ORIGINS: ${UI_ORIGINS:-http://localhost:3000}
    volumes:
      - ./api:/app/api
    ports:
      - "8000:8000"

  frontend:
    build: ./ui
    environment:
     BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    volumes:
      - ./ui:/app
      - /app/node_modules
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    name: tasks_data